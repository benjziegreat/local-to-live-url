<div class="min-h-screen bg-slate-50 text-slate-900">
  <div class="mx-auto max-w-2xl px-4 py-10 sm:py-16">
    <header class="mb-6">
      <h1 class="text-2xl font-semibold tracking-tight">Tunnel Admin Dashboard</h1>
      <p class="mt-1 text-sm text-slate-500">Reach a local server from a phone or anywhere, no router or LAN configuration required.</p>
    </header>

    <div class="mb-8 flex gap-1 rounded-lg border border-slate-200 bg-slate-100 p-1">
      <button
        type="button"
        (click)="selectTab('cloudflare')"
        class="flex-1 rounded-md px-3 py-2 text-sm font-medium transition-colors"
        [class.bg-white]="activeTab() === 'cloudflare'"
        [class.shadow-sm]="activeTab() === 'cloudflare'"
        [class.text-slate-900]="activeTab() === 'cloudflare'"
        [class.text-slate-500]="activeTab() !== 'cloudflare'"
      >
        Tunnel Admin
      </button>
      <button
        type="button"
        (click)="selectTab('public-ip')"
        class="flex-1 rounded-md px-3 py-2 text-sm font-medium transition-colors"
        [class.bg-white]="activeTab() === 'public-ip'"
        [class.shadow-sm]="activeTab() === 'public-ip'"
        [class.text-slate-900]="activeTab() === 'public-ip'"
        [class.text-slate-500]="activeTab() !== 'public-ip'"
      >
        Tunnel to Public Ip url
      </button>
    </div>

    @if (activeTab() === 'cloudflare') {
      <app-tunnel-admin />
    } @else {
      <app-public-ip-tunnel />
    }
  </div>
</div>
